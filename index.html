<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game KNB? - Host</title>
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; text-align: center; padding-top: 50px; }
        #winner-display { border: 4px solid #facc15; padding: 40px; border-radius: 20px; width: 80%; margin: auto; background: #1e293b; }
        h1 { font-family: 'Impact', sans-serif; font-size: 4rem; color: #22c55e; text-transform: uppercase; }
        button { margin-top: 30px; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 1rem; color: white; margin-left: 10px; }
        .reset-btn { background: #ef4444; }
        .open-btn { background: #3b82f6; }
    </style>
</head>
<body>
    <div id="winner-display"><h1>WAITING FOR BUZZ...</h1></div>
    <button class="reset-btn" onclick="resetGame()">RESET ROUND</button>
    <button class="open-btn" onclick="openPlayerPage()">OPEN PLAYER VIEW</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        
        const firebaseConfig = { const app = initializeApp(firebaseConfig);/* PASTE YOUR FIREBASE CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let answered = false;

        onChildAdded(ref(db, 'answers/'), (snapshot) => {
            if (!answered) {
                const data = snapshot.val();
                document.getElementById('winner-display').innerHTML = 
                    `<h1>${data.name}</h1><p style="font-size: 2rem;">Answered: ${data.answer}</p>`;
                answered = true;
            }
        });

        window.resetGame = () => {
            remove(ref(db, 'answers/'));
            document.getElementById('winner-display').innerHTML = "<h1>WAITING FOR BUZZ...</h1>";
            answered = false;
        };

        window.openPlayerPage = () => {
            window.open('https://yourusername.github.io/game-knb-buzzer/player.html', '_blank');
        };
    </script>
</body>
</html>
